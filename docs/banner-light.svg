<svg viewBox="0 0 720 120" width="720" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wg" gradientUnits="userSpaceOnUse" x1="120" y1="0" x2="600" y2="0">
      <stop offset="0%" stop-color="#1a7f37" stop-opacity="0"/>
      <stop offset="15%" stop-color="#1a7f37"/>
      <stop offset="50%" stop-color="#0550ae"/>
      <stop offset="85%" stop-color="#8250df"/>
      <stop offset="100%" stop-color="#8250df" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ag" gradientUnits="userSpaceOnUse" x1="340" y1="58" x2="470" y2="28">
      <stop offset="0%" stop-color="#1a7f37"/>
      <stop offset="50%" stop-color="#0550ae"/>
      <stop offset="100%" stop-color="#8250df"/>
    </linearGradient>
  </defs>
  <!-- Warp lines -->
  <g opacity="0.06" stroke="#1f2328" stroke-width="1">
    <line x1="160" y1="0" x2="160" y2="120"/><line x1="180" y1="0" x2="180" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="120"/><line x1="220" y1="0" x2="220" y2="120"/>
    <line x1="240" y1="0" x2="240" y2="120"/><line x1="260" y1="0" x2="260" y2="120"/>
    <line x1="280" y1="0" x2="280" y2="120"/><line x1="300" y1="0" x2="300" y2="120"/>
    <line x1="320" y1="0" x2="320" y2="120"/><line x1="340" y1="0" x2="340" y2="120"/>
    <line x1="360" y1="0" x2="360" y2="120"/><line x1="380" y1="0" x2="380" y2="120"/>
    <line x1="400" y1="0" x2="400" y2="120"/><line x1="420" y1="0" x2="420" y2="120"/>
    <line x1="440" y1="0" x2="440" y2="120"/><line x1="460" y1="0" x2="460" y2="120"/>
    <line x1="480" y1="0" x2="480" y2="120"/><line x1="500" y1="0" x2="500" y2="120"/>
    <line x1="520" y1="0" x2="520" y2="120"/><line x1="540" y1="0" x2="540" y2="120"/>
    <line x1="560" y1="0" x2="560" y2="120"/>
  </g>
  <!-- Weft lines (animate: expand from center) -->
  <rect x="360" y="15" width="0" height="1" fill="url(#wg)" opacity="0">
    <animate attributeName="width" from="0" to="480" dur="0.8s" begin="0.3s" fill="freeze"/>
    <animate attributeName="x" from="360" to="120" dur="0.8s" begin="0.3s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.15" dur="0.8s" begin="0.3s" fill="freeze"/>
  </rect>
  <rect x="360" y="33" width="0" height="1" fill="url(#wg)" opacity="0">
    <animate attributeName="width" from="0" to="420" dur="0.8s" begin="0.5s" fill="freeze"/>
    <animate attributeName="x" from="360" to="150" dur="0.8s" begin="0.5s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.15" dur="0.8s" begin="0.5s" fill="freeze"/>
  </rect>
  <rect x="360" y="65" width="0" height="1" fill="url(#wg)" opacity="0">
    <animate attributeName="width" from="0" to="380" dur="0.8s" begin="0.7s" fill="freeze"/>
    <animate attributeName="x" from="360" to="170" dur="0.8s" begin="0.7s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.15" dur="0.8s" begin="0.7s" fill="freeze"/>
  </rect>
  <rect x="360" y="88" width="0" height="1" fill="url(#wg)" opacity="0">
    <animate attributeName="width" from="0" to="420" dur="0.8s" begin="0.9s" fill="freeze"/>
    <animate attributeName="x" from="360" to="150" dur="0.8s" begin="0.9s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.15" dur="0.8s" begin="0.9s" fill="freeze"/>
  </rect>
  <rect x="360" y="105" width="0" height="1" fill="url(#wg)" opacity="0">
    <animate attributeName="width" from="0" to="480" dur="0.8s" begin="1.1s" fill="freeze"/>
    <animate attributeName="x" from="360" to="120" dur="0.8s" begin="1.1s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.15" dur="0.8s" begin="1.1s" fill="freeze"/>
  </rect>
  <!-- Title (fade in + rise) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 6" to="0 0" dur="0.6s" begin="0.2s" fill="freeze"/>
    <text x="360" y="55" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="42" font-weight="700" letter-spacing="-1"><tspan fill="#1f2328">Open</tspan><tspan fill="url(#ag)">Weft</tspan></text>
  </g>
  <!-- Subtitle (fade in + rise, delayed) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.0s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 6" to="0 0" dur="0.5s" begin="1.0s" fill="freeze"/>
    <text x="360" y="82" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#656d76" letter-spacing="2">FIRE-AND-FORGET AGENT ORCHESTRATION</text>
  </g>
</svg>
