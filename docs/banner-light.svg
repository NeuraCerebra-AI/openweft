  <!-- === TEXT LAYER === -->
  <text x="360" y="55" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="42" font-weight="700" letter-spacing="-1"><tspan fill="#1f2328">Open</tspan><tspan fill="url(#ag)">Weft</tspan></text>
  <text x="360" y="82" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#656d76" letter-spacing="2">FIRE-AND-FORGET AGENT ORCHESTRATION</text>
