<svg fill="none" viewBox="0 0 720 120" width="720" height="120" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .banner {
          width: 100%;
          height: 120px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: relative;
          overflow: hidden;
        }

        .warp {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          display: flex;
          justify-content: center;
          gap: 18px;
          opacity: 0.06;
        }
        .warp-line {
          width: 1px;
          height: 100%;
          background: #1f2328;
        }

        .weft {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 12px;
          align-items: center;
        }
        .weft-line {
          height: 1px;
          background: linear-gradient(90deg, transparent 0%, #1a7f37 15%, #0550ae 50%, #8250df 85%, transparent 100%);
          opacity: 0;
          border-radius: 1px;
        }
        .w1 { width: 480px; animation: weave 1.2s ease-out 0.3s forwards; }
        .w2 { width: 420px; animation: weave 1.2s ease-out 0.5s forwards; }
        .w3 { width: 380px; animation: weave 1.2s ease-out 0.7s forwards; }
        .w4 { width: 420px; animation: weave 1.2s ease-out 0.9s forwards; }
        .w5 { width: 480px; animation: weave 1.2s ease-out 1.1s forwards; }

        @keyframes weave {
          0%   { opacity: 0; transform: scaleX(0); }
          60%  { opacity: 0.3; transform: scaleX(1); }
          100% { opacity: 0.15; transform: scaleX(1); }
        }

        .title-wrap {
          position: relative;
          z-index: 2;
          text-align: center;
        }
        .title {
          font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
          font-size: 42px;
          font-weight: 700;
          letter-spacing: -1px;
          color: #1f2328;
          line-height: 1;
          opacity: 0;
          animation: titleIn 0.8s ease-out 0.2s forwards;
        }
        .title .accent {
          background: linear-gradient(135deg, #1a7f37 0%, #0550ae 50%, #8250df 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
        .subtitle {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
          font-size: 14px;
          color: #656d76;
          margin-top: 8px;
          letter-spacing: 2px;
          text-transform: uppercase;
          opacity: 0;
          animation: titleIn 0.6s ease-out 1.0s forwards;
        }

        @keyframes titleIn {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      </style>

      <div class="banner">
        <div class="warp">
          <div class="warp-line"> </div><div class="warp-line"> </div><div class="warp-line"> </div>
          <div class="warp-line"> </div><div class="warp-line"> </div><div class="warp-line"> </div>
          <div class="warp-line"> </div><div class="warp-line"> </div><div class="warp-line"> </div>
          <div class="warp-line"> </div><div class="warp-line"> </div><div class="warp-line"> </div>
          <div class="warp-line"> </div><div class="warp-line"> </div><div class="warp-line"> </div>
          <div class="warp-line"> </div><div class="warp-line"> </div><div class="warp-line"> </div>
          <div class="warp-line"> </div><div class="warp-line"> </div><div class="warp-line"> </div>
          <div class="warp-line"> </div><div class="warp-line"> </div><div class="warp-line"> </div>
          <div class="warp-line"> </div><div class="warp-line"> </div><div class="warp-line"> </div>
        </div>
        <div class="weft">
          <div class="weft-line w1"> </div>
          <div class="weft-line w2"> </div>
          <div class="weft-line w3"> </div>
          <div class="weft-line w4"> </div>
          <div class="weft-line w5"> </div>
        </div>
        <div class="title-wrap">
          <div class="title">Open<span class="accent">Weft</span></div>
          <div class="subtitle">fire-and-forget agent orchestration</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
