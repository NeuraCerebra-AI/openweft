<svg viewBox="0 0 720 200" width="720" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Weft shuttle lines — alternating left/right dash movement */
    @keyframes weft-r { to { stroke-dashoffset: -36; } }
    @keyframes weft-l { to { stroke-dashoffset: 36; } }
    @keyframes weft-r2 { to { stroke-dashoffset: -48; } }
    @keyframes weft-l2 { to { stroke-dashoffset: 32; } }
    @keyframes weft-r3 { to { stroke-dashoffset: -30; } }
    @keyframes weft-l3 { to { stroke-dashoffset: 24; } }

    .w1 { animation: weft-r 2.0s linear infinite; }
    .w2 { animation: weft-l 2.8s linear infinite; }
    .w3 { animation: weft-r2 2.4s linear infinite; }
    .w4 { animation: weft-l 3.2s linear infinite; }
    .w5 { animation: weft-r3 1.8s linear infinite; }
    .w6 { animation: weft-l 3.6s linear infinite; }
    .w7 { animation: weft-r2 3.0s linear infinite; }
    .w8 { animation: weft-l2 2.2s linear infinite; }
    .w9 { animation: weft-r2 3.6s linear infinite; }
    .w10 { animation: weft-l2 2.6s linear infinite; }
    .w11 { animation: weft-r2 2.0s linear infinite; }
    .w12 { animation: weft-l3 1.6s linear infinite; }

    /* Node pulse */
    @keyframes pulse { 0%,100% { opacity: 0.08; } 50% { opacity: 0.40; } }
    .n1 { animation: pulse 0.9s ease-in-out infinite; }
    .n2 { animation: pulse 1.0s ease-in-out 0.4s infinite; }
    .n3 { animation: pulse 1.0s ease-in-out 0.1s infinite; }
    .n4 { animation: pulse 0.9s ease-in-out 0.6s infinite; }
    .n5 { animation: pulse 0.8s ease-in-out 0.2s infinite; }
    .n6 { animation: pulse 1.1s ease-in-out 0.8s infinite; }
    .n7 { animation: pulse 0.7s ease-in-out 0.2s infinite; }
    .n8 { animation: pulse 1.0s ease-in-out 0.5s infinite; }
    .n9 { animation: pulse 1.1s ease-in-out 0.9s infinite; }
    .n10 { animation: pulse 0.8s ease-in-out 0.3s infinite; }
    .n11 { animation: pulse 1.0s ease-in-out 0.7s infinite; }
    .n12 { animation: pulse 0.9s ease-in-out 0.1s infinite; }
    .n13 { animation: pulse 1.1s ease-in-out 0.6s infinite; }
    .n14 { animation: pulse 0.8s ease-in-out 0.3s infinite; }
    .n15 { animation: pulse 1.1s ease-in-out 0.8s infinite; }
    .n16 { animation: pulse 1.0s ease-in-out 0.1s infinite; }
    .n17 { animation: pulse 0.9s ease-in-out 0.6s infinite; }
    .n18 { animation: pulse 0.8s ease-in-out 0.4s infinite; }
    .n19 { animation: pulse 1.1s ease-in-out 0.9s infinite; }
    .n20 { animation: pulse 0.9s ease-in-out 0.4s infinite; }
    .n21 { animation: pulse 1.0s ease-in-out 0.7s infinite; }

    /* Ambient glow drift */
    @keyframes glow-drift { 0%,100% { opacity: 0.03; } 50% { opacity: 0.06; } }
    .glow { animation: glow-drift 4s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="ag" gradientUnits="userSpaceOnUse" x1="320" y1="96" x2="480" y2="56">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="50%" stop-color="#a5d6ff"/>
      <stop offset="100%" stop-color="#d2a8ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.4" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#a5d6ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a5d6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="720" height="200" fill="#0d1117"/>

  <!-- Ambient glow -->
  <rect x="0" y="0" width="720" height="200" fill="url(#glow)" class="glow"/>

  <!-- Warp grid (vertical threads) -->
  <g opacity="0.12" stroke="#e6edf3" stroke-width="1">
    <line x1="160" y1="0" x2="160" y2="200"/><line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/><line x1="220" y1="0" x2="220" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/><line x1="260" y1="0" x2="260" y2="200"/>
    <line x1="280" y1="0" x2="280" y2="200"/><line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/><line x1="340" y1="0" x2="340" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/><line x1="380" y1="0" x2="380" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/><line x1="420" y1="0" x2="420" y2="200"/>
    <line x1="440" y1="0" x2="440" y2="200"/><line x1="460" y1="0" x2="460" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/><line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="520" y1="0" x2="520" y2="200"/><line x1="540" y1="0" x2="540" y2="200"/>
    <line x1="560" y1="0" x2="560" y2="200"/>
  </g>

  <!-- Weft shuttle lines (CSS-animated dashes) -->
  <line class="w1" x1="100" y1="10" x2="620" y2="10" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 30" opacity="0.30"/>
  <line class="w2" x1="80" y1="22" x2="640" y2="22" stroke="#a5d6ff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="12 24" opacity="0.25"/>
  <line class="w3" x1="110" y1="35" x2="610" y2="35" stroke="#d2a8ff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 12 8 24" opacity="0.30"/>
  <line class="w4" x1="80" y1="48" x2="640" y2="48" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="8 28" opacity="0.25"/>
  <line class="w5" x1="100" y1="60" x2="620" y2="60" stroke="#a5d6ff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="5 25" opacity="0.28"/>
  <line class="w6" x1="150" y1="72" x2="570" y2="72" stroke="#d2a8ff" stroke-width="1" stroke-linecap="round" stroke-dasharray="6 30" opacity="0.12"/>
  <line class="w7" x1="150" y1="130" x2="570" y2="130" stroke="#7ee787" stroke-width="1" stroke-linecap="round" stroke-dasharray="3 15 10 20" opacity="0.12"/>
  <line class="w8" x1="100" y1="142" x2="620" y2="142" stroke="#a5d6ff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="10 22" opacity="0.28"/>
  <line class="w9" x1="110" y1="155" x2="610" y2="155" stroke="#d2a8ff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="14 34" opacity="0.30"/>
  <line class="w10" x1="80" y1="168" x2="640" y2="168" stroke="#7ee787" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="8 24" opacity="0.25"/>
  <line class="w11" x1="100" y1="180" x2="620" y2="180" stroke="#a5d6ff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 18 3 21" opacity="0.30"/>
  <line class="w12" x1="110" y1="192" x2="610" y2="192" stroke="#d2a8ff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 20" opacity="0.25"/>

  <!-- Intersection nodes (CSS-animated pulse) -->
  <path class="n1" d="M200,7.5 L202.5,10 L200,12.5 L197.5,10Z" fill="#7ee787"/>
  <path class="n2" d="M400,7.5 L402.5,10 L400,12.5 L397.5,10Z" fill="#7ee787"/>
  <circle class="n3" cx="260" cy="22" r="2" fill="#a5d6ff"/>
  <circle class="n4" cx="480" cy="22" r="2" fill="#a5d6ff"/>
  <path class="n5" d="M180,32.5 L182.5,35 L180,37.5 L177.5,35Z" fill="#d2a8ff"/>
  <path class="n6" d="M360,32.5 L362.5,35 L360,37.5 L357.5,35Z" fill="#d2a8ff"/>
  <path class="n7" d="M520,32.5 L522.5,35 L520,37.5 L517.5,35Z" fill="#d2a8ff"/>
  <circle class="n8" cx="300" cy="48" r="2" fill="#7ee787"/>
  <circle class="n9" cx="500" cy="48" r="2" fill="#7ee787"/>
  <path class="n10" d="M220,57.5 L222.5,60 L220,62.5 L217.5,60Z" fill="#a5d6ff"/>
  <path class="n11" d="M440,57.5 L442.5,60 L440,62.5 L437.5,60Z" fill="#a5d6ff"/>
  <circle class="n12" cx="240" cy="142" r="2" fill="#a5d6ff"/>
  <circle class="n13" cx="460" cy="142" r="2" fill="#a5d6ff"/>
  <path class="n14" d="M320,152.5 L322.5,155 L320,157.5 L317.5,155Z" fill="#d2a8ff"/>
  <path class="n15" d="M540,152.5 L542.5,155 L540,157.5 L537.5,155Z" fill="#d2a8ff"/>
  <circle class="n16" cx="200" cy="168" r="2" fill="#7ee787"/>
  <circle class="n17" cx="420" cy="168" r="2" fill="#7ee787"/>
  <path class="n18" d="M280,177.5 L282.5,180 L280,182.5 L277.5,180Z" fill="#a5d6ff"/>
  <path class="n19" d="M500,177.5 L502.5,180 L500,182.5 L497.5,180Z" fill="#a5d6ff"/>
  <circle class="n20" cx="340" cy="192" r="2" fill="#d2a8ff"/>
  <circle class="n21" cx="520" cy="192" r="2" fill="#d2a8ff"/>

  <!-- Text -->
  <text x="360" y="92" text-anchor="middle" font-family="monospace" font-size="48" font-weight="700" letter-spacing="-1"><tspan fill="#e6edf3">Open</tspan><tspan fill="url(#ag)">Weft</tspan></text>
  <text x="360" y="122" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#7d8590" letter-spacing="3">FIRE-AND-FORGET AGENT ORCHESTRATION</text>
</svg>
