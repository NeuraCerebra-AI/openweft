<svg viewBox="0 0 720 120" width="720" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wg" gradientUnits="userSpaceOnUse" x1="120" y1="0" x2="600" y2="0">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0"/>
      <stop offset="15%" stop-color="#7ee787"/>
      <stop offset="50%" stop-color="#a5d6ff"/>
      <stop offset="85%" stop-color="#d2a8ff"/>
      <stop offset="100%" stop-color="#d2a8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ag" gradientUnits="userSpaceOnUse" x1="340" y1="58" x2="470" y2="28">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="50%" stop-color="#a5d6ff"/>
      <stop offset="100%" stop-color="#d2a8ff"/>
    </linearGradient>
    <!-- Slow-drifting ambient glow -->
    <radialGradient id="glow" cx="0.3" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#a5d6ff" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#a5d6ff" stop-opacity="0"/>
      <animate attributeName="cx" values="0.2;0.5;0.8;0.5;0.2" dur="16s" repeatCount="indefinite"/>
    </radialGradient>
  </defs>

  <!-- === LIVING LOOM BACKGROUND === -->

  <!-- Ambient glow drift -->
  <rect x="0" y="0" width="720" height="120" fill="url(#glow)"/>

  <!-- Warp grid (static vertical threads) -->
  <g opacity="0.04" stroke="#e6edf3" stroke-width="1">
    <line x1="160" y1="0" x2="160" y2="120"/><line x1="180" y1="0" x2="180" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="120"/><line x1="220" y1="0" x2="220" y2="120"/>
    <line x1="240" y1="0" x2="240" y2="120"/><line x1="260" y1="0" x2="260" y2="120"/>
    <line x1="280" y1="0" x2="280" y2="120"/><line x1="300" y1="0" x2="300" y2="120"/>
    <line x1="320" y1="0" x2="320" y2="120"/><line x1="340" y1="0" x2="340" y2="120"/>
    <line x1="360" y1="0" x2="360" y2="120"/><line x1="380" y1="0" x2="380" y2="120"/>
    <line x1="400" y1="0" x2="400" y2="120"/><line x1="420" y1="0" x2="420" y2="120"/>
    <line x1="440" y1="0" x2="440" y2="120"/><line x1="460" y1="0" x2="460" y2="120"/>
    <line x1="480" y1="0" x2="480" y2="120"/><line x1="500" y1="0" x2="500" y2="120"/>
    <line x1="520" y1="0" x2="520" y2="120"/><line x1="540" y1="0" x2="540" y2="120"/>
    <line x1="560" y1="0" x2="560" y2="120"/>
  </g>

  <!-- Animated weft lines — organic wave pulse, varied durations and phases -->
  <rect x="150" y="5" width="420" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="7.0s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <rect x="130" y="15" width="460" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="8.0s" begin="3.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="120" y="25" width="480" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="6.5s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="135" y="35" width="450" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="7.5s" begin="4.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="160" y="48" width="400" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.08;0.03" dur="6.0s" begin="2.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="170" y="58" width="380" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.07;0.03" dur="8.5s" begin="5.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="160" y="68" width="400" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.08;0.03" dur="7.2s" begin="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="135" y="78" width="450" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="6.8s" begin="3.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="120" y="88" width="480" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="7.8s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="130" y="98" width="460" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="6.3s" begin="4.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="150" y="108" width="420" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.09;0.03" dur="7.5s" begin="2.7s" repeatCount="indefinite"/>
  </rect>
  <rect x="170" y="115" width="380" height="1" fill="url(#wg)" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.08;0.03" dur="8.2s" begin="5.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Accent nodes — pulsing intersection highlights, varied colors and timing -->
  <circle cx="200" cy="15" r="1.5" fill="#7ee787" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.14;0.02" dur="4.5s" begin="0.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="8" r="1.5" fill="#a5d6ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.12;0.02" dur="5.2s" begin="1.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="25" r="1.5" fill="#d2a8ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.13;0.02" dur="4.0s" begin="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="35" r="1.5" fill="#7ee787" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.11;0.02" dur="5.8s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="48" r="1.5" fill="#a5d6ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.13;0.02" dur="4.3s" begin="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="58" r="1.5" fill="#d2a8ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.10;0.02" dur="5.5s" begin="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="68" r="1.5" fill="#7ee787" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.12;0.02" dur="4.8s" begin="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="460" cy="78" r="1.5" fill="#a5d6ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.14;0.02" dur="5.0s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="88" r="1.5" fill="#d2a8ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.11;0.02" dur="4.2s" begin="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="98" r="1.5" fill="#7ee787" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.13;0.02" dur="5.3s" begin="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="5" r="1.5" fill="#d2a8ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.10;0.02" dur="4.6s" begin="1.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="108" r="1.5" fill="#a5d6ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.12;0.02" dur="5.1s" begin="4.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="115" r="1.5" fill="#7ee787" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.11;0.02" dur="4.4s" begin="2.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="48" r="1.5" fill="#d2a8ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.10;0.02" dur="5.6s" begin="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="35" r="1.5" fill="#a5d6ff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.09;0.02" dur="4.7s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- === TEXT LAYER (always visible, rock solid) === -->
  <text x="360" y="55" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="42" font-weight="700" letter-spacing="-1"><tspan fill="#e6edf3">Open</tspan><tspan fill="url(#ag)">Weft</tspan></text>
  <text x="360" y="82" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#7d8590" letter-spacing="2">FIRE-AND-FORGET AGENT ORCHESTRATION</text>
</svg>
